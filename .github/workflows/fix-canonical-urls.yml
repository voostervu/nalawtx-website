name: Fix Canonical URLs

on:
  workflow_dispatch: {}

jobs:
  fix-canonical-tags:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run canonical tag fix
        run: |
          python3 << 'PYEOF'
          import re
          from pathlib import Path

          CANONICAL_PATTERN = re.compile(
              r'<link\s+([^>]*?)rel\s*=\s*["\']canonical["\']([^>]*?)>',
              re.IGNORECASE,
          )
          HREF_PATTERN = re.compile(r'href\s*=\s*["\']([^"\']+)["\']', re.IGNORECASE)

          def clean_url(url):
              if url.endswith('/index.html'):
                  return url[:-len('index.html')]
              if url.endswith('.html'):
                  return url[:-5]
              return url

          repo_root = Path('.').resolve()
          skip_dirs = {'node_modules', '.git', 'dist', 'build', '_site'}
          html_files = []
          for path in repo_root.rglob('*.html'):
              if any(part in skip_dirs for part in path.parts):
                  continue
              html_files.append(path)

          print(f"Found {len(html_files)} HTML files")

          changed = 0
          for filepath in html_files:
              try:
                  content = filepath.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue

              match = CANONICAL_PATTERN.search(content)
              if not match:
                  continue

              full_tag = match.group(0)
              href_match = HREF_PATTERN.search(full_tag)
              if not href_match:
                  continue

              old_url = href_match.group(1)
              new_url = clean_url(old_url)
              if old_url == new_url:
                  continue

              new_tag = full_tag.replace(old_url, new_url)
              new_content = content.replace(full_tag, new_tag, 1)
              filepath.write_text(new_content, encoding='utf-8')
              print(f"Updated: {filepath.relative_to(repo_root)}")
              print(f"  {old_url} -> {new_url}")
              changed += 1

          print(f"\nTotal updated: {changed} files")
          PYEOF

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add .
            git commit -m "Fix canonical URLs to remove .html extension"
            git push origin main
          fi
