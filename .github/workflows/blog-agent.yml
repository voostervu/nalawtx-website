name: Blog Agent

on:
  # Weekly: every Monday at 9am Central (14:00 UTC in winter, 10am Central in summer due to DST).
  schedule:
    - cron: "0 14 * * 1"
  # Always allow manual triggers for testing.
  workflow_dispatch: {}

# Concurrency: never let two runs overlap. Cancel any in-progress run if a new one starts.
concurrency:
  group: blog-agent
  cancel-in-progress: false

jobs:
  generate-post:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # commit new files
      pull-requests: write  # open / merge PRs
      issues: write         # create failure notification issues

    steps:
      - name: Set cadence flag
        id: cadence
        run: |
          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "Weekly cadence — running every Monday."

      - name: Checkout
        if: steps.cadence.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can create branches cleanly

      - name: Set up Python
        if: steps.cadence.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.cadence.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt

      - name: Run CEO agent
        if: steps.cadence.outputs.should_run == 'true'
        id: ceo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          BLOG_AGENT_SHEET_ID: ${{ secrets.BLOG_AGENT_SHEET_ID }}
        run: |
          python .github/scripts/ceo.py

      - name: Configure git
        if: steps.cadence.outputs.should_run == 'true' && steps.ceo.outputs.slug != ''
        run: |
          git config user.name "blog-agent[bot]"
          git config user.email "blog-agent@nalawtx.com"

      - name: Create branch and commit
        if: steps.cadence.outputs.should_run == 'true' && steps.ceo.outputs.slug != ''
        id: commit
        run: |
          BRANCH="blog-agent/${{ steps.ceo.outputs.slug }}"
          git checkout -b "$BRANCH"
          git add blog/
          if git diff --staged --quiet; then
            echo "No changes to commit. Exiting."
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "blog: ${{ steps.ceo.outputs.title }}

          Topic: ${{ steps.ceo.outputs.topic }}
          Auto-generated by blog-agent.
          "
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "committed=true" >> $GITHUB_OUTPUT

      - name: Check compliance status for auto-merge
        if: steps.commit.outputs.committed == 'true'
        id: check_merge
        run: |
          HTML_FILE="blog/${{ steps.ceo.outputs.slug }}.html"
          
          if [ ! -f "$HTML_FILE" ]; then
            echo "auto_merge=false" >> $GITHUB_OUTPUT
            echo "reason=HTML file not found at expected path" >> $GITHUB_OUTPUT
            echo "::warning::HTML file not found at $HTML_FILE — auto-merge skipped"
            exit 0
          fi
          
          # Check for review flags first — any flag means human review needed
          if grep -q "REVIEW:" "$HTML_FILE"; then
            echo "auto_merge=false" >> $GITHUB_OUTPUT
            echo "reason=Compliance agent flagged items for human review" >> $GITHUB_OUTPUT
            echo "::warning::Review flags present in post — auto-merge skipped, awaiting human review"
            exit 0
          fi
          
          # Check for Summary status: PASS in the compliance audit comment
          if grep -q "Summary status: PASS" "$HTML_FILE"; then
            echo "auto_merge=true" >> $GITHUB_OUTPUT
            echo "reason=Compliance passed, no flags present" >> $GITHUB_OUTPUT
            echo "✅ Compliance status: PASS, no review flags — auto-merge approved"
          else
            echo "auto_merge=false" >> $GITHUB_OUTPUT
            echo "reason=Compliance status not PASS (either FLAGGED, AUTO-FIXED, or missing)" >> $GITHUB_OUTPUT
            echo "::warning::Compliance audit did not return PASS — auto-merge skipped, awaiting human review"
          fi

      - name: Open pull request
        if: steps.commit.outputs.committed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "Blog draft: ${{ steps.ceo.outputs.title }}" \
            --body "Auto-generated by the blog agent.

          **Topic:** ${{ steps.ceo.outputs.topic }}
          **Slug:** ${{ steps.ceo.outputs.slug }}
          **Auto-merge eligibility:** ${{ steps.check_merge.outputs.auto_merge }}
          **Reason:** ${{ steps.check_merge.outputs.reason }}

          ### Review checklist
          - [ ] Voice reads like a human, not an AI
          - [ ] No outcome guarantees or dollar promises
          - [ ] Statute citations are accurate (check audit comment at top of file)
          - [ ] Houston/Texas-specific references are real
          - [ ] No tone-deaf timing given current events
          - [ ] Internal links point to real pages
          - [ ] Meta description and OG tags look good

          The Compliance + Citation audit results are in an HTML comment at the top of the new blog file. Open the file to see what was audited and any flags.

          Once merged, Netlify will publish to https://nalawtx.com/blog/${{ steps.ceo.outputs.slug }}.html" \
            --head "${{ steps.commit.outputs.branch }}" \
            --base main)
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "PR opened: $PR_URL"

      - name: Auto-merge if compliance passed
        if: steps.commit.outputs.committed == 'true' && steps.check_merge.outputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ steps.commit.outputs.branch }}" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::Could not find PR number for branch ${{ steps.commit.outputs.branch }}"
            exit 1
          fi
          
          # Squash-merge the PR, delete the branch after merge
          gh pr merge "$PR_NUMBER" --squash --delete-branch
          echo "✅ PR #$PR_NUMBER auto-merged (Compliance status: PASS, no review flags)"

      - name: Summarize result
        if: steps.commit.outputs.committed == 'true'
        run: |
          if [ "${{ steps.check_merge.outputs.auto_merge }}" = "true" ]; then
            echo "::notice::✅ Post auto-merged. Will be live within 60 seconds."
          else
            echo "::notice::⏸️  PR opened for human review. Reason: ${{ steps.check_merge.outputs.reason }}"
            echo "::notice::Review the PR: ${{ steps.pr.outputs.pr_url }}"
          fi

      # ----------------------------------------------------------------------
      # Failure notification: creates a GitHub issue if any step above failed.
      # GitHub auto-emails the repo owner when an issue is created.
      # ----------------------------------------------------------------------
      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATE_HUMAN=$(date +"%B %d, %Y at %H:%M UTC")
          
          gh issue create \
            --title "🚨 Blog agent failed on $(date +%Y-%m-%d)" \
            --body "The blog generation workflow failed on $DATE_HUMAN.

          **Failed workflow run:** $RUN_URL

          ### What this means
          The blog agent attempted to generate a new post but ran into an error. The current week may not produce a new post unless the issue is resolved before next Monday.

          ### Possible causes
          - Anthropic API outage or rate limit hit
          - Google Sheets API issue (auth, sheet renamed, sheet permissions changed)
          - Code change broke something
          - GitHub Actions runner issue
          - One of the agent scripts (writer, editor, compliance) threw an exception

          ### Next steps
          1. Click the **Failed workflow run** link above
          2. Look for the step that has a red ❌ icon
          3. Click that step to see the full error log
          4. Common quick fixes:
             - If it's a transient API issue: re-run the workflow manually
             - If credentials expired: refresh the relevant GitHub Secret
             - If code error: roll back recent changes to ceo.py or related scripts

          The topic this run was attempting has been re-marked as 'Queued' in the Blog Topics Sheet, so it'll be picked up on the next successful run." \
            --label "blog-agent,bug,automation"
          
          echo "🚨 Failure notification issue created. Check your email."
