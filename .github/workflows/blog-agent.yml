name: Blog Agent

on:
  # Bi-weekly: every other Monday at 9am Central (14:00 UTC during CST, 13:00 UTC during CDT).
  # We schedule for 14:00 UTC which becomes 9am Central in winter and 10am Central in summer.
  # If you want a stricter target, set up a workflow_dispatch with a calendar service instead.
  schedule:
    - cron: "0 14 * * 1"
  # Always allow manual triggers for testing.
  workflow_dispatch: {}

# Concurrency: never let two runs overlap. Cancel any in-progress run if a new one starts.
concurrency:
  group: blog-agent
  cancel-in-progress: false

jobs:
  generate-post:
    runs-on: ubuntu-latest
    # Phase 1 controls the bi-weekly cadence in-process. To toggle bi-weekly vs weekly,
    # check whether this run should actually generate based on ISO week number.
    # Simpler approach: just keep schedule at weekly and skip every other week here.
    if: github.event_name == 'workflow_dispatch' || (github.event.schedule == '0 14 * * 1')

    permissions:
      contents: write       # commit new files
      pull-requests: write  # open a PR

    steps:
      - name: Skip if not a bi-weekly week
        id: cadence
        run: |
          # ISO week number — generate on even-numbered weeks only (every other week).
          # If you want weekly, change to: echo "should_run=true" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Manual trigger — running."
          else
            WEEK=$(date +%V)
            if [ $((10#$WEEK % 2)) -eq 0 ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "Week $WEEK is even — running."
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "Week $WEEK is odd — skipping this cycle."
            fi
          fi

      - name: Checkout
        if: steps.cadence.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can create branches cleanly

      - name: Set up Python
        if: steps.cadence.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.cadence.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt

      - name: Run CEO agent
        if: steps.cadence.outputs.should_run == 'true'
        id: ceo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          BLOG_AGENT_SHEET_ID: ${{ secrets.BLOG_AGENT_SHEET_ID }}
          # Optional: pin model. Defaults to claude-sonnet-4-6 if unset.
          # WRITER_MODEL: claude-sonnet-4-6-20250901
        run: |
          python .github/scripts/ceo.py

      - name: Configure git
        if: steps.cadence.outputs.should_run == 'true' && steps.ceo.outputs.slug != ''
        run: |
          git config user.name "blog-agent[bot]"
          git config user.email "blog-agent@nalawtx.com"

      - name: Create branch and commit
        if: steps.cadence.outputs.should_run == 'true' && steps.ceo.outputs.slug != ''
        id: commit
        run: |
          BRANCH="blog-agent/${{ steps.ceo.outputs.slug }}"
          git checkout -b "$BRANCH"
          git add blog/
          if git diff --staged --quiet; then
            echo "No changes to commit. Exiting."
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "blog: ${{ steps.ceo.outputs.title }}

          Topic: ${{ steps.ceo.outputs.topic }}
          Auto-generated by blog-agent. Review before merging.
          "
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "committed=true" >> $GITHUB_OUTPUT

      - name: Open pull request
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Blog draft: ${{ steps.ceo.outputs.title }}" \
            --body "Auto-generated by the blog agent.

          **Topic:** ${{ steps.ceo.outputs.topic }}
          **Slug:** ${{ steps.ceo.outputs.slug }}

          ### Review checklist
          - [ ] Voice reads like a human, not an AI
          - [ ] No outcome guarantees or dollar promises
          - [ ] Statute citations (if any) are accurate
          - [ ] Houston/Texas-specific references are real and current
          - [ ] No tone-deaf claims given current events
          - [ ] Internal links point to real pages
          - [ ] Meta description and OG tags look good

          Once merged, Netlify will publish to https://nalawtx.com/blog/${{ steps.ceo.outputs.slug }}.html

          Reply to this PR with \`@blog-agent <instruction>\` to request a revision (Phase 2 feature — coming soon)." \
            --head "${{ steps.commit.outputs.branch }}" \
            --base main
